# XcodeGen spec. Generate the Xcode project with:
#   brew install xcodegen   (one time)
#   xcodegen generate
#   open ScoutFinder.xcodeproj
#
# Or create the project manually in Xcode (see README.md → "Manual Xcode setup").
name: ScoutFinder
options:
  bundleIdPrefix: com.scoutfinder
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
targets:
  ScoutFinder:
    type: application
    platform: iOS
    sources:
      - path: ScoutFinder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.scoutfinder.app
        PRODUCT_NAME: ScoutFinder
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ScoutFinder/App/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
